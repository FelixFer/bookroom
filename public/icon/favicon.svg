<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" width="16" height="16" shape-rendering="crispEdges">
  <!-- Pixel art book favicon with warm colors -->
  
  <!-- Row 3: Top border -->
  <rect x="2" y="3" width="10" height="1" fill="#5C3D2E"/>
  <rect x="12" y="3" width="1" height="1" fill="#F5E6D3"/>
  
  <!-- Row 4-11: Book body -->
  <rect x="1" y="4" width="1" height="8" fill="#5C3D2E"/>
  <rect x="2" y="4" width="2" height="8" fill="#7A5233"/>
  <rect x="4" y="4" width="8" height="8" fill="#C4956A"/>
  <rect x="12" y="4" width="1" height="8" fill="#5C3D2E"/>
  <rect x="13" y="4" width="1" height="8" fill="#F5E6D3"/>
  
  <!-- Row 12: Bottom border -->
  <rect x="2" y="12" width="10" height="1" fill="#5C3D2E"/>
  <rect x="12" y="12" width="1" height="1" fill="#F5E6D3"/>
  
  <!-- Spine detail lines -->
  <rect x="2" y="5" width="2" height="1" fill="#5C3D2E" opacity="0.3"/>
  <rect x="2" y="10" width="2" height="1" fill="#5C3D2E" opacity="0.3"/>
</svg>
